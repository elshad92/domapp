server {
    listen 80;
    server_name domapp.uz www.domapp.uz;
    # После certbot этот блок заменится на 443 автоматически
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name domapp.uz www.domapp.uz;

    # SSL — заполнит certbot
    ssl_certificate /etc/letsencrypt/live/domapp.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/domapp.uz/privkey.pem;

    # Frontend (React build)
    root /opt/domapp/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }
}
